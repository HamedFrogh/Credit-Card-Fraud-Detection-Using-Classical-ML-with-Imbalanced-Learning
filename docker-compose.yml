services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - MODEL_VERSION=${MODEL_VERSION:-v1}
      - ARTIFACTS_DIR=/app/artifacts
      - MODEL_PATH=/app/artifacts/fraud_model_${MODEL_VERSION:-v1}.joblib
      - MODEL_METADATA_PATH=/app/artifacts/fraud_model_${MODEL_VERSION:-v1}.json
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
